<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Live FIFA World Cup 2026 group standings and scores — auto-updates as matches happen.">
  <title>FIFA World Cup 2026 — Live Standings</title><!-- v2 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">⚽</span>
        <div>
          <h1>FIFA World Cup 2026</h1>
          <p class="subtitle">Live Standings &amp; Scores</p>
        </div>
      </div>
      <div class="status-bar">
        <span class="live-indicator" id="live-indicator" hidden>
          <span class="pulse"></span> Live
        </span>
        <span class="last-updated" id="last-updated">Loading…</span>
        <button class="refresh-btn" id="refresh-btn" title="Refresh now" aria-label="Refresh data">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="live-section" id="live-section" hidden>
      <h2 class="section-title">
        <span class="live-dot"></span> Live &amp; Upcoming Matches
      </h2>
      <div class="matches-grid" id="matches-grid"></div>
    </section>

    <section class="standings-section">
      <div class="section-header">
        <h2 class="section-title">Group Standings</h2>
        <div class="legend">
          <span class="legend-item qualified">Top 2 advance</span>
          <span class="legend-item third">3rd — best 8 advance</span>
        </div>
      </div>
      <div class="groups-grid" id="groups-grid">
        <div class="loading-state" id="loading-state">
          <div class="spinner"></div>
          <p>Fetching latest standings…</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Data from <a href="https://worldcup26.ir" target="_blank" rel="noopener">worldcup26.ir</a> · Auto-refreshes every 60s</p>
    <p class="footer-note">Hosted free on GitHub Pages</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
